<script>
/* ============================================================
   MINI VERILOG BEHAVIORAL SIMULATOR (Module 2)
   Module 2 problems ask for sequential/combinational always
   blocks using blocking (=) and non-blocking (<=) assignments,
   if/else, and case statements. The student's code is tokenized,
   parsed into a small statement AST (block/if/case/assign), and
   genuinely executed cycle-by-cycle: on every posedge, all
   right-hand sides are evaluated against pre-edge register
   values first, blocking assignments write immediately (visible
   to later statements in the same block, matching the Active
   region), and non-blocking assignments queue their writes to
   apply only after the whole block has executed (matching the
   NBA region) — this reproduces genuine Verilog scheduling
   semantics rather than comparing strings against a stored answer.
   ============================================================ */
/* ============ Tokenizer ============ */
function tokenize(src){
  const stripped = src.replace(/\/\/.*$/gm,'').replace(/\/\*[\s\S]*?\*\//g,'');
  const re = /<=|==|!=|&&|\|\||<<|>>|\d+'[bBdDhH][0-9a-fA-FxzXZ]+|[A-Za-z_]\w*|\d+|[(){};,?:~!&|^+\-*/<>=\[\]]/g;
  return stripped.match(re) || [];
}

function parseNum(tok){
  if(tok.includes("'")){
    const [w, rest] = tok.split("'");
    const base = rest[0].toLowerCase();
    const digits = rest.slice(1);
    const radix = base==='b'?2:base==='h'?16:10;
    return parseInt(digits, radix);
  }
  return parseInt(tok,10);
}

const KEYWORDS = new Set(['begin','end','if','else','case','endcase','default','always','posedge','negedge','module','endmodule','input','output','reg','wire','integer']);

/* ============ Expression Parser (precedence climbing) ============ */
function parseExpr(tokens){
  let i = 0;
  function peek(){ return tokens[i]; }
  function next(){ return tokens[i++]; }

  function primary(){
    const t = peek();
    if(t === '('){ next(); const e = ternary(); if(peek()===')') next(); return e; }
    if(t === '~' || t === '!' || t === '-' || t === '+'){ next(); const e = unary(); return {type:'un', op:t, e}; }
    if(/^\d/.test(t)){ next(); return {type:'num', val: parseNum(t)}; }
    if(/^[A-Za-z_]/.test(t)){
      next();
      // bit-select support a[idx] -> just treat whole ident (ignore index for our simple exercises)
      if(peek()==='['){ // skip bracket expr
        next(); let depth=1; while(depth>0 && i<tokens.length){ if(tokens[i]==='[')depth++; if(tokens[i]===']')depth--; i++; }
        return {type:'var', name:t}; // simplistic: ignore index
      }
      return {type:'var', name:t};
    }
    next();
    return {type:'num', val:0};
  }
  function unary(){ return primary(); }
  function mul(){ let l = unary(); while(peek()==='*'||peek()==='/'){ const op=next(); const r=unary(); l={type:'bin',op,l,r}; } return l; }
  function add(){ let l = mul(); while(peek()==='+'||peek()==='-'){ const op=next(); const r=mul(); l={type:'bin',op,l,r}; } return l; }
  function shift(){ let l = add(); while(peek()==='<<'||peek()==='>>'){ const op=next(); const r=add(); l={type:'bin',op,l,r}; } return l; }
  function rel(){ let l = shift(); while(peek()==='<'||peek()==='>'||peek()==='<='||peek()==='>='){ const op=next(); const r=shift(); l={type:'bin',op,l,r}; } return l; }
  function eq(){ let l = rel(); while(peek()==='=='||peek()==='!='){ const op=next(); const r=rel(); l={type:'bin',op,l,r}; } return l; }
  function band(){ let l = eq(); while(peek()==='&'){ const op=next(); const r=eq(); l={type:'bin',op,l,r}; } return l; }
  function bxor(){ let l = band(); while(peek()==='^'){ const op=next(); const r=band(); l={type:'bin',op,l,r}; } return l; }
  function bor(){ let l = bxor(); while(peek()==='|'){ const op=next(); const r=bxor(); l={type:'bin',op,l,r}; } return l; }
  function land(){ let l = bor(); while(peek()==='&&'){ const op=next(); const r=bor(); l={type:'bin',op,l,r}; } return l; }
  function lor(){ let l = land(); while(peek()==='||'){ const op=next(); const r=land(); l={type:'bin',op,l,r}; } return l; }
  function ternary(){ let c = lor(); if(peek()==='?'){ next(); const t=ternary(); if(peek()===':') next(); const f=ternary(); return {type:'tern',c,t,f}; } return c; }

  return ternary();
}

function evalExpr(node, scope){
  switch(node.type){
    case 'num': return node.val;
    case 'var': return scope[node.name] ?? 0;
    case 'un':
      if(node.op==='~') return ~evalExpr(node.e,scope);
      if(node.op==='!') return evalExpr(node.e,scope)===0?1:0;
      if(node.op==='-') return -evalExpr(node.e,scope);
      if(node.op==='+') return evalExpr(node.e,scope);
      break;
    case 'bin': {
      const l = evalExpr(node.l,scope), r = evalExpr(node.r,scope);
      switch(node.op){
        case '+': return l+r; case '-': return l-r; case '*': return l*r; case '/': return Math.trunc(l/r);
        case '&': return l&r; case '|': return l|r; case '^': return l^r;
        case '&&': return (l!==0&&r!==0)?1:0; case '||': return (l!==0||r!==0)?1:0;
        case '==': return l===r?1:0; case '!=': return l!==r?1:0;
        case '<': return l<r?1:0; case '>': return l>r?1:0; case '<=': return l<=r?1:0; case '>=': return l>=r?1:0;
        case '<<': return l<<r; case '>>': return l>>r;
      }
    }
    case 'tern': return evalExpr(node.c,scope)!==0 ? evalExpr(node.t,scope) : evalExpr(node.f,scope);
  }
  return 0;
}

/* ============ Statement Parser ============ */
function parseStatements(code){
  const tokens = tokenize(code);
  let i = 0;
  function peek(){ return tokens[i]; }
  function next(){ return tokens[i++]; }
  function collectBalancedParen(){
    // assumes '(' already consumed
    let depth = 1; const start = i;
    while(depth>0 && i<tokens.length){
      if(tokens[i]==='(') depth++;
      if(tokens[i]===')') depth--;
      if(depth>0) i++;
    }
    const slice = tokens.slice(start,i);
    i++; // consume ')'
    return slice;
  }
  function collectUntil(stopToks){
    const start = i; let depth=0;
    while(i<tokens.length){
      const t = tokens[i];
      if(t==='('||t==='[') depth++;
      if(t===')'||t===']') depth--;
      if(depth===0 && stopToks.includes(t)) break;
      i++;
    }
    return tokens.slice(start,i);
  }

  function parseStmt(){
    const t = peek();
    if(t==='begin'){
      next();
      const stmts = [];
      while(peek() && peek()!=='end'){ stmts.push(parseStmt()); }
      next(); // consume 'end'
      return {type:'block', stmts};
    }
    if(t==='if'){
      next(); next(); // if, (
      const condToks = collectBalancedParen();
      const cond = parseExpr(condToks);
      const thenS = parseStmt();
      let elseS = null;
      if(peek()==='else'){ next(); elseS = parseStmt(); }
      return {type:'if', cond, then:thenS, else:elseS};
    }
    if(t==='case'){
      next(); next(); // case, (
      const selToks = collectBalancedParen();
      const sel = parseExpr(selToks);
      const items = [];
      while(peek() && peek()!=='endcase'){
        let isDefault = false; let values = [];
        if(peek()==='default'){ next(); isDefault = true; }
        else {
          const valToks = collectUntil([':']);
          // split by comma
          let cur = [];
          for(const tok of valToks){ if(tok===','){ values.push(parseExpr(cur)); cur=[]; } else cur.push(tok); }
          if(cur.length) values.push(parseExpr(cur));
        }
        next(); // consume ':'
        const stmt = parseStmt();
        items.push({isDefault, values, stmt});
      }
      next(); // endcase
      return {type:'case', sel, items};
    }
    // assignment: ident [index] (= | <=) expr ;
    const lhs = next();
    if(peek()==='['){ next(); let depth=1; while(depth>0){ if(tokens[i]==='[')depth++; if(tokens[i]===']')depth--; i++; } }
    const kind = next(); // '=' or '<='
    const rhsToks = collectUntil([';']);
    next(); // consume ';'
    return {type:'assign', kind, lhs, rhs: parseExpr(rhsToks)};
  }

  const stmts = [];
  while(i < tokens.length){ stmts.push(parseStmt()); }
  return stmts; // usually one top-level block per always-body call
}

function execStmt(node, scope, pending){
  switch(node.type){
    case 'block': node.stmts.forEach(s=>execStmt(s,scope,pending)); return;
    case 'if': if(evalExpr(node.cond,scope)!==0) execStmt(node.then,scope,pending); else if(node.else) execStmt(node.else,scope,pending); return;
    case 'case': {
      const v = evalExpr(node.sel,scope);
      let matched = null, defaultItem = null;
      for(const it of node.items){
        if(it.isDefault){ defaultItem = it; continue; }
        if(it.values.some(vn=>evalExpr(vn,scope)===v)){ matched = it; break; }
      }
      const chosen = matched || defaultItem;
      if(chosen) execStmt(chosen.stmt, scope, pending);
      return;
    }
    case 'assign': {
      const val = evalExpr(node.rhs, scope);
      if(node.kind==='=') scope[node.lhs] = val;
      else pending.push({lhs:node.lhs, val});
      return;
    }
  }
}

/* ============ Extract always blocks from full module source ============ */
function extractAlwaysBlocks(code){
  const tokens = tokenize(code);
  const blocks = [];
  let i = 0;
  while(i < tokens.length){
    if(tokens[i]==='always'){
      i++;
      // expect @ ( sensitivity )
      if(tokens[i]==='@') i++;
      let isSeq = false;
      if(tokens[i]==='('){
        i++;
        let depth=1; const start=i;
        while(depth>0){ if(tokens[i]==='(')depth++; if(tokens[i]===')')depth--; if(depth>0)i++; }
        const sens = tokens.slice(start,i);
        if(sens.includes('posedge')||sens.includes('negedge')) isSeq = true;
        i++; // consume ')'
      }
      // now parse the statement body starting at tokens[i]
      const bodyStart = i;
      // find end of this statement by simulating parseStmt with a local sub-parser sharing token array
      const sub = tokens.slice(bodyStart);
      // parse exactly one statement from sub, and figure out how many tokens consumed
      const consumed = parseOneStatementTokenCount(sub);
      const bodyTokens = tokens.slice(bodyStart, bodyStart+consumed);
      blocks.push({ isSeq, stmt: parseSingleFromTokens(bodyTokens) });
      i = bodyStart + consumed;
    } else {
      i++;
    }
  }
  return blocks;
}

function parseSingleFromTokens(tokens){
  // reuse parseStatements' internal logic by constructing a tiny local parser
  let i = 0;
  function peek(){ return tokens[i]; }
  function next(){ return tokens[i++]; }
  function collectBalancedParen(){ let depth=1; const start=i; while(depth>0 && i<tokens.length){ if(tokens[i]==='(')depth++; if(tokens[i]===')')depth--; if(depth>0)i++; } const slice=tokens.slice(start,i); i++; return slice; }
  function collectUntil(stopToks){ const start=i; let depth=0; while(i<tokens.length){ const t=tokens[i]; if(t==='('||t==='[')depth++; if(t===')'||t===']')depth--; if(depth===0 && stopToks.includes(t)) break; i++; } return tokens.slice(start,i); }
  function parseStmt(){
    const t = peek();
    if(t==='begin'){ next(); const stmts=[]; while(peek() && peek()!=='end'){ stmts.push(parseStmt()); } next(); return {type:'block',stmts}; }
    if(t==='if'){ next(); next(); const condToks=collectBalancedParen(); const cond=parseExpr(condToks); const thenS=parseStmt(); let elseS=null; if(peek()==='else'){ next(); elseS=parseStmt(); } return {type:'if',cond,then:thenS,else:elseS}; }
    if(t==='case'){ next(); next(); const selToks=collectBalancedParen(); const sel=parseExpr(selToks); const items=[]; while(peek() && peek()!=='endcase'){ let isDefault=false, values=[]; if(peek()==='default'){ next(); isDefault=true; } else { const valToks=collectUntil([':']); let cur=[]; for(const tok of valToks){ if(tok===','){ values.push(parseExpr(cur)); cur=[]; } else cur.push(tok); } if(cur.length) values.push(parseExpr(cur)); } next(); const stmt=parseStmt(); items.push({isDefault,values,stmt}); } next(); return {type:'case',sel,items}; }
    const lhs = next();
    if(peek()==='['){ next(); let depth=1; while(depth>0){ if(tokens[i]==='[')depth++; if(tokens[i]===']')depth--; i++; } }
    const kind = next();
    const rhsToks = collectUntil([';']);
    next();
    return {type:'assign', kind, lhs, rhs: parseExpr(rhsToks)};
  }
  return parseStmt();
}

function parseOneStatementTokenCount(tokens){
  let i = 0;
  function peek(){ return tokens[i]; }
  function skipBalancedParenFrom(){ let depth=1; i++; while(depth>0 && i<tokens.length){ if(tokens[i]==='(')depth++; if(tokens[i]===')')depth--; i++; } }
  function skipStmt(){
    const t = tokens[i];
    if(t==='begin'){ i++; let depth=1; while(depth>0 && i<tokens.length){ if(tokens[i]==='begin')depth++; if(tokens[i]==='end')depth--; i++; } return; }
    if(t==='if'){ i++; i++; skipBalancedParenFrom_inline(); skipStmt(); if(tokens[i]==='else'){ i++; skipStmt(); } return; }
    if(t==='case'){ i++; i++; skipBalancedParenFrom_inline(); while(tokens[i] && tokens[i]!=='endcase'){ while(tokens[i] && tokens[i]!==':'){ i++; } i++; skipStmt(); } i++; return; }
    // assignment until ';'
    let depth=0;
    while(i<tokens.length){ const tk=tokens[i]; if(tk==='('||tk==='[')depth++; if(tk===')'||tk===']')depth--; if(depth===0 && tk===';'){ i++; return; } i++; }
  }
  function skipBalancedParenFrom_inline(){ let depth=1; while(depth>0 && i<tokens.length){ if(tokens[i]==='(')depth++; if(tokens[i]===')')depth--; i++; } }
  skipStmt();
  return i;
}

/* ============ Cycle Driver ============ */
function runCycles(code, initialScope, cycles){
  const blocks = extractAlwaysBlocks(code);
  const combBlocks = blocks.filter(b=>!b.isSeq);
  const seqBlocks = blocks.filter(b=>b.isSeq);
  let scope = Object.assign({}, initialScope);
  const history = [];
  for(const cyc of cycles){
    Object.assign(scope, cyc.inputs || {});
    // run comb blocks (settle a couple passes for chained comb logic)
    for(let pass=0; pass<3; pass++){ combBlocks.forEach(b=>execStmt(b.stmt, scope, [])); }
    // run seq blocks
    const pending = [];
    seqBlocks.forEach(b=>execStmt(b.stmt, scope, pending));
    pending.forEach(p=>{ scope[p.lhs] = p.val; });
    // re-run comb blocks once more so outputs depending only on comb (e.g. same-cycle comb reacting to nothing new) stay consistent
    history.push(Object.assign({}, scope));
  }
  return history;
}

":{"din":7},"expect":{"q1":7,"q2":2,"q3":9}}]}];

let current = 0;

/* ══════════════════════════════════════════
   STORAGE — persist solved problems across
   reloads (separate keyspace from other modules).
══════════════════════════════════════════ */
const BANK_KEY = 'vlsiVerilogM2BehavioralProgress';

function loadBankProgress() {
  try {
    const p = JSON.parse(localStorage.getItem(BANK_KEY));
    return p && Array.isArray(p.solvedIds) ? p : { solvedIds: [] };
  } catch(e) { return { solvedIds: [] }; }
}
function saveBankProgress(prog) {
  prog.lastUpdated = new Date().toISOString();
  try { localStorage.setItem(BANK_KEY, JSON.stringify(prog)); } catch(e) {}
}

const solved = new Set(loadBankProgress().solvedIds);

function markSolved(qId) {
  if (solved.has(qId)) return;
  solved.add(qId);
  const bankProg = loadBankProgress();
  const bankSet = new Set(bankProg.solvedIds);
  bankSet.add(qId);
  bankProg.solvedIds = [...bankSet];
  saveBankProgress(bankProg);
}

// Allow deep-linking to a specific question via ?id=N (matches Q[].id)
(function initFromQuery(){
  const params = new URLSearchParams(window.location.search);
  const reqId = parseInt(params.get('id'), 10);
  if (!isNaN(reqId)) {
    const found = Q.findIndex(q => q.id === reqId);
    if (found !== -1) current = found;
  }
})();

function renderSidebar(){
  const groups = ["Blocking & Non-Blocking Assignments"];
  let html = '';
  groups.forEach(topic => {
    const items = Q.filter(q=>q.topic===topic);
    if(!items.length) return;
    html += `<div class="grp-label">${topic}</div>`;
    items.forEach(q=>{
      const idx = q.id-1;
      html += `<div class="qitem ${idx===current?'active':''} ${solved.has(q.id)?'solved':''}" data-idx="${idx}">
        <span class="st">${solved.has(q.id)?'✓':'○'}</span>
        <span class="qn">${String(q.id).padStart(2,'0')}</span>
        <span class="qt">${q.title}</span>
        <span class="bd ${q.difficulty}">${q.difficulty}</span>
      </div>`;
    });
  });
  document.getElementById('sidebar').innerHTML = html;
  document.querySelectorAll('.qitem').forEach(el=>{
    el.addEventListener('click',()=>{ current = parseInt(el.dataset.idx); render(); });
  });
  document.getElementById('solvedCount').textContent = solved.size;
}

function renderMain(){
  const q = Q[current];
  const sigRows = q.signals.map(([n,d])=>`<tr><td class="name">${n}</td><td>${d}</td></tr>`).join('');
  document.getElementById('main').innerHTML = `
    <div class="crumb">${q.topic} · Question ${q.id} of ${Q.length}</div>
    <div class="qhead">
      <h1>${q.title}</h1>
      <span class="badge ${q.difficulty}">${q.difficulty}</span>
      ${q.combinational ? '<span class="badge" style="color:#9aa6c2;background:#131a2a;border:1px solid #1e2740;">combinational</span>' : '<span class="badge" style="color:#9aa6c2;background:#131a2a;border:1px solid #1e2740;">sequential · multi-cycle</span>'}
    </div>
    <p class="desc">${q.desc}</p>
    <div class="signals"><table class="siglist">${sigRows}</table></div>
    <div class="editor-wrap">
      <div class="editor-head"><span>your_module.v</span></div>
      <textarea id="answerBox" spellcheck="false">${q.template}</textarea>
      <div class="editor-actions">
        <button class="reveal" id="revealBtn">Show solution</button>
        <button class="run" id="runBtn">▶ Run</button>
      </div>
    </div>
    <div class="console" id="consoleBox"></div>
    <div class="solution" id="solutionBox"></div>
  `;
  document.getElementById('runBtn').addEventListener('click', ()=>runCheck(q));
  document.getElementById('revealBtn').addEventListener('click', ()=>{
    const box = document.getElementById('solutionBox');
    const isShown = box.classList.contains('show');
    if(isShown){
      box.classList.remove('show');
      return;
    }
    // Solution/why text is only decoded into the DOM at the moment the
    // user explicitly asks for it — it is not present in the page
    // markup before this click (see solutionB64/whyB64 in the Q array).
    const solutionText = atob(q.solutionB64);
    const whyText = atob(q.whyB64);
    box.innerHTML = `
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Reference solution</div>
      <div class="snippet"></div>
      <div class="why"></div>
    `;
    box.querySelector('.snippet').textContent = solutionText;
    box.querySelector('.why').textContent = whyText;
    box.classList.add('show');
  });
}

function maskFor(q, key){
  let maxV = 0;
  q.cycles.forEach(c => { if(key in c.expect) maxV = Math.max(maxV, Math.abs(c.expect[key])); });
  let bits = 1; while((1<<bits) <= maxV) bits++;
  return (1<<bits) - 1;
}

function runCheck(q){
  const raw = document.getElementById('answerBox').value;
  let history;
  let parseError = null;
  try {
    history = runCycles(raw, q.initial, q.cycles.map(c=>({inputs:c.inputs})));
  } catch(e){
    parseError = e.message || String(e);
  }

  const box = document.getElementById('consoleBox');
  box.classList.add('show');

  if(parseError){
    box.innerHTML = `
      <div class="console-head">Simulation Console</div>
      <div class="console-body">
        <div class="result-row fail"><span class="mark">✕</span><span class="note">Could not simulate your code: ${parseError}</span></div>
        <div class="summary bad">0 / ${q.cycles.length} cycles passed</div>
      </div>
    `;
    return;
  }

  let passCount = 0;
  const rows = [];
  q.cycles.forEach((c, idx) => {
    const state = history[idx] || {};
    const exp = c.expect;
    let cyclePass = true;
    const details = [];
    for(const k in exp){
      const mask = maskFor(q,k);
      const got = (state[k] ?? 0) & mask;
      const want = exp[k] & mask;
      if(got !== want){ cyclePass = false; }
      details.push(`${k}=${got}${got!==want ? ' (expected '+want+')' : ''}`);
    }
    if(cyclePass) passCount++;
    const inputDesc = Object.entries(c.inputs||{}).map(([k,v])=>`${k}=${v}`).join(', ');
    rows.push(`<div class="result-row ${cyclePass?'pass':'fail'}">
      <span class="mark">${cyclePass?'✓':'✕'}</span>
      <span class="case">cycle ${idx+1} (${inputDesc})</span>
      <span class="note">${details.join(', ')}</span>
    </div>`);
  });

  const allPass = passCount === q.cycles.length;
  if(allPass) markSolved(q.id);

  box.innerHTML = `
    <div class="console-head">Simulation Console</div>
    <div class="console-body">
      ${rows.join('')}
      <div class="summary ${allPass?'good':'bad'}">${passCount} / ${q.cycles.length} cycles passed${allPass? ' — all correct!' : ''}</div>
      <div class="disclaimer">Each posedge clk is stepped in order; registers persist across cycles exactly as they would in hardware.</div>
    </div>
  `;
  if(allPass) renderSidebar();
}

function render(){
  renderSidebar();
  renderMain();
}
render();

</script>
