<script>
/* ============================================================
   MINI VERILOG GATE-LEVEL NETLIST EVALUATOR (Module 1)
   Module 1 problems ask for structural gate-primitive
   instantiations only (and, or, not, nand, nor, xor, xnor, buf) —
   no assign statements, no arithmetic. Every gate instance in the
   student's code is located by regex, wired into a netlist keyed
   by output net name, and evaluated by fixed-point propagation
   against each test vector's input values — this is genuine
   netlist simulation, not a string comparison against a stored
   answer. Multi-input and/or/nand/nor/xor/xnor gates (3+ ports)
   are supported, matching real Verilog gate primitives.
   ============================================================ */

const GATE_FN = {
  and:  (ins) => ins.reduce((a,b)=>a & b, 1),
  or:   (ins) => ins.reduce((a,b)=>a | b, 0),
  nand: (ins) => ins.reduce((a,b)=>a & b, 1) === 0 ? 1 : 0,
  nor:  (ins) => ins.reduce((a,b)=>a | b, 0) === 0 ? 1 : 0,
  xor:  (ins) => ins.reduce((a,b)=>a ^ b, 0),
  xnor: (ins) => ins.reduce((a,b)=>a ^ b, 0) === 0 ? 1 : 0,
  not:  (ins) => ins[0] === 0 ? 1 : 0,
  buf:  (ins) => ins[0]
};

// Extract every `<gateType> [instanceName] ( out, in1, in2, ... );` from student code.
function extractGates(code){
  // strip line comments
  const stripped = code.replace(/\/\/.*$/gm, '');
  const re = /\b(and|or|nand|nor|xor|xnor|not|buf)\s+(?:[A-Za-z_]\w*\s*)?\(([^)]*)\)\s*;/g;
  const gates = [];
  let m;
  while((m = re.exec(stripped)) !== null){
    const parts = m[2].split(',').map(s=>s.trim()).filter(s=>s.length);
    if(parts.length < 2){
      throw new Error(`gate '${m[1]}' needs an output and at least one input`);
    }
    gates.push({ type: m[1], out: parts[0], ins: parts.slice(1) });
  }
  return gates;
}

function evalGateLevel(code, outNames, sigs){
  let gates;
  try { gates = extractGates(code); }
  catch(e){ return { ok:false, reason: 'Could not parse gate instances: ' + e.message }; }

  if(gates.length === 0){
    return { ok:false, reason: 'no gate instances (and/or/not/nand/nor/xor/xnor/buf) found' };
  }

  // index gates by output net
  const byOut = {};
  gates.forEach(g => { byOut[g.out] = g; });

  for(const name of outNames){
    if(!(name in byOut)){
      return { ok:false, reason: `no gate drives output '${name}'` };
    }
  }

  const pool = Object.assign({}, sigs);
  const pending = new Set(gates.map(g => g.out));
  let lastErr = null;

  for(let pass = 0; pass < gates.length + 2 && pending.size > 0; pass++){
    let progressed = false;
    for(const g of gates){
      if(!pending.has(g.out)) continue;
      try {
        const inputVals = g.ins.map(sig => {
          if(sig === "1'b0" || sig === "0") return 0;
          if(sig === "1'b1" || sig === "1") return 1;
          if(!(sig in pool)) throw new Error(`unknown net '${sig}'`);
          return pool[sig];
        });
        pool[g.out] = GATE_FN[g.type](inputVals);
        pending.delete(g.out);
        progressed = true;
      } catch(e){
        lastErr = e;
      }
    }
    if(!progressed) break;
  }

  if(pending.size > 0){
    const unresolved = Array.from(pending).join(', ');
    return { ok:false, reason: `could not resolve net(s): ${unresolved}${lastErr ? ' (' + lastErr.message + ')' : ''}` };
  }

  const results = {};
  for(const name of outNames){
    results[name] = pool[name];
  }
  return { ok:true, values: results };
}

let current = 0;

/* ══════════════════════════════════════════
   STORAGE — persist solved problems across
   reloads (separate keyspace from other modules).
══════════════════════════════════════════ */
const BANK_KEY = 'vlsiVerilogM1GateLevelProgress';

function loadBankProgress() {
  try {
    const p = JSON.parse(localStorage.getItem(BANK_KEY));
    return p && Array.isArray(p.solvedIds) ? p : { solvedIds: [] };
  } catch(e) { return { solvedIds: [] }; }
}
function saveBankProgress(prog) {
  prog.lastUpdated = new Date().toISOString();
  try { localStorage.setItem(BANK_KEY, JSON.stringify(prog)); } catch(e) {}
}

const solved = new Set(loadBankProgress().solvedIds);

function markSolved(qId) {
  if (solved.has(qId)) return;
  solved.add(qId);
  const bankProg = loadBankProgress();
  const bankSet = new Set(bankProg.solvedIds);
  bankSet.add(qId);
  bankProg.solvedIds = [...bankSet];
  saveBankProgress(bankProg);
}

// Allow deep-linking to a specific question via ?id=N (matches Q[].id)
(function initFromQuery(){
  const params = new URLSearchParams(window.location.search);
  const reqId = parseInt(params.get('id'), 10);
  if (!isNaN(reqId)) {
    const found = Q.findIndex(q => q.id === reqId);
    if (found !== -1) current = found;
  }
})();

function renderSidebar(){
  const groups = ["Priority & Arbitration Logic","Safety & Interlock Circuits","Voting & Decision Logic","Encoders & Selectors","Comparators & Merge Logic"];
  let html = '';
  groups.forEach(topic => {
    const items = Q.filter(q=>q.topic===topic);
    if(!items.length) return;
    html += `<div class="grp-label">${topic}</div>`;
    items.forEach(q=>{
      const idx = q.id-1;
      html += `<div class="qitem ${idx===current?'active':''} ${solved.has(q.id)?'solved':''}" data-idx="${idx}">
        <span class="st">${solved.has(q.id)?'✓':'○'}</span>
        <span class="qn">${String(q.id).padStart(2,'0')}</span>
        <span class="qt">${q.title}</span>
        <span class="bd ${q.difficulty}">${q.difficulty}</span>
      </div>`;
    });
  });
  document.getElementById('sidebar').innerHTML = html;
  document.querySelectorAll('.qitem').forEach(el=>{
    el.addEventListener('click',()=>{ current = parseInt(el.dataset.idx); render(); });
  });
  document.getElementById('solvedCount').textContent = solved.size;
}

function renderMain(){
  const q = Q[current];
  const sigRows = q.signals.map(([n,d])=>`<tr><td class="name">${n}</td><td>${d}</td></tr>`).join('');
  document.getElementById('main').innerHTML = `
    <div class="crumb">${q.topic} · Question ${q.id} of ${Q.length}</div>
    <div class="qhead">
      <h1>${q.title}</h1>
      <span class="badge ${q.difficulty}">${q.difficulty}</span>
    </div>
    <p class="desc">${q.desc}</p>
    <div class="signals"><table class="siglist">${sigRows}</table></div>
    <div class="editor-wrap">
      <div class="editor-head"><span>your_module.v</span></div>
      <textarea id="answerBox" spellcheck="false">${q.template}</textarea>
      <div class="editor-actions">
        <button class="reveal" id="revealBtn">Show solution</button>
        <button class="run" id="runBtn">▶ Run</button>
      </div>
    </div>
    <div class="console" id="consoleBox"></div>
    <div class="solution" id="solutionBox"></div>
  `;
  document.getElementById('runBtn').addEventListener('click', ()=>runCheck(q));
  document.getElementById('revealBtn').addEventListener('click', ()=>{
    const box = document.getElementById('solutionBox');
    const isShown = box.classList.contains('show');
    if(isShown){
      box.classList.remove('show');
      return;
    }
    // Solution/why text is only decoded into the DOM at the moment the
    // user explicitly asks for it — it is not present in the page
    // markup before this click (see solutionB64/whyB64 in the Q array).
    const solutionText = atob(q.solutionB64);
    const whyText = atob(q.whyB64);
    box.innerHTML = `
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Reference solution</div>
      <div class="snippet"></div>
      <div class="why"></div>
    `;
    box.querySelector('.snippet').textContent = solutionText;
    box.querySelector('.why').textContent = whyText;
    box.classList.add('show');
  });
}

function runCheck(q){
  const raw = document.getElementById('answerBox').value;
  const outNames = Object.keys(q.outWidths);
  const results = q.tests.map(tv => {
    const evalRes = evalGateLevel(raw, outNames, tv.sigs);
    if(!evalRes.ok) return { name: tv.name, pass:false, note: evalRes.reason };
    const mismatches = [];
    outNames.forEach(n=>{
      if(evalRes.values[n] !== tv.expected[n]) mismatches.push(`${n}=${evalRes.values[n]} (expected ${tv.expected[n]})`);
    });
    const pass = mismatches.length === 0;
    const note = pass
      ? outNames.map(n=>`${n}=${evalRes.values[n]}`).join(', ') + ' — matches expected output'
      : mismatches.join(', ');
    return { name: tv.name, pass, note };
  });

  const allPass = results.every(r => r.pass);
  if(allPass) markSolved(q.id);

  const rows = results.map(r=>`
    <div class="result-row ${r.pass?'pass':'fail'}">
      <span class="mark">${r.pass?'✓':'✗'}</span>
      <span class="case">${r.name}</span>
      <span class="note">${r.note}</span>
    </div>`).join('');

  const summary = allPass
    ? `<div class="summary good">${results.length} / ${results.length} test vectors passed — logic accepted.</div>`
    : `<div class="summary bad">${results.filter(r=>r.pass).length} / ${results.length} test vectors passed.</div>`;

  const box = document.getElementById('consoleBox');
  box.classList.add('show');
  box.innerHTML = `
    <div class="console-head">Console · ${new Date().toLocaleTimeString()}</div>
    <div class="console-body">
      ${rows}
      ${summary}
      <div class="disclaimer">Your gate instances are wired into a netlist and simulated directly against each input combination — this is genuine structural simulation, not a comparison to a stored answer.</div>
    </div>`;

  renderSidebar();
}

function render(){ renderSidebar(); renderMain(); }
render();
</script>
